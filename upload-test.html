<!DOCTYPE html>
<html>
<head>

<title>Meesho AI Catalog Generator</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#ff3f8e;
padding:40px;
color:white;
}

h1{
font-size:40px;
margin-bottom:10px;
}

button{
background:white;
color:#ff3f8e;
padding:15px 30px;
border:none;
font-size:18px;
cursor:pointer;
margin-top:20px;
border-radius:8px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:30px;
margin-top:40px;
}

.card{
text-align:center;
}

img{
width:200px;
background:white;
padding:20px;
border-radius:10px;
}

a{
display:block;
margin-top:10px;
color:white;
font-weight:bold;
text-decoration:none;
}

</style>

</head>

<body>

<h1>Meesho Image Generator</h1>

<p>Upload your product image and generate optimized catalog images.</p>

<input type="file" id="file">

<br>

<button onclick="generate()">Generate Images</button>

<div class="grid" id="gallery"></div>

<script>

function generate(){

const file=document.getElementById("file").files[0]

if(!file){
alert("Upload image first")
return
}

const data=new FormData()

data.append("file",file)
data.append("upload_preset","unsigned_upload")

fetch("https://api.cloudinary.com/v1_1/dziivw8db/image/upload",{

method:"POST",
body:data

})

.then(res=>res.json())
.then(result=>{

const id=result.public_id

const variations=[

"c_fill,w_2000,h_2000,b_white",
"c_pad,b_white,w_2000,h_2000",
"c_fill,w_1800,h_1800",
"c_fill,w_1600,h_1600",
"c_fill,w_1500,h_1500",
"c_fill,w_1400,h_1400",
"c_fill,w_1300,h_1300",
"c_fill,w_1200,h_1200",
"c_fill,w_1100,h_1100",
"c_fill,w_1000,h_1000"

]

const gallery=document.getElementById("gallery")

gallery.innerHTML=""

variations.forEach(v=>{

const card=document.createElement("div")
card.className="card"

const img=document.createElement("img")

const url=`https://res.cloudinary.com/dziivw8db/image/upload/${v}/${id}.png`

img.src=url

const link=document.createElement("a")

link.href=url
link.download="catalog-image"
link.innerText="Download"

card.appendChild(img)
card.appendChild(link)

gallery.appendChild(card)

})

})

}

</script>

</body>

</html>
