<!DOCTYPE html>
<html>

<head>

<title>SellerAI - Meesho Image Generator</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9ecb,#ff5fa2);
margin:0;
padding:0;
text-align:center;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:60px 20px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
opacity:0.9;
margin-bottom:30px;
}

.upload-box{
background:white;
padding:40px;
border-radius:12px;
color:#333;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
border:2px dashed #ff4d88;
}

.upload-box.drag{
background:#fff0f5;
}

input[type=file]{
margin-top:10px;
}

button{
margin-top:20px;
padding:15px 30px;
background:#ff4d88;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff2f73;
}

.gallery{
margin-top:50px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
color:#333;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
max-width:100%;
border-radius:8px;
}

.download{
display:inline-block;
margin-top:10px;
padding:8px 15px;
background:#ff4d88;
color:white;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

.loader{
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Meesho AI Image Generator</h1>

<p>Upload your product image and generate optimized catalog images.</p>

<div class="upload-box" id="dropZone">

<p>Drag & Drop Image Here</p>

<input type="file" id="file">

<br>

<button onclick="generate()">Generate Images</button>

<br>

<button onclick="downloadAll()">Download All Images</button>

<div class="loader" id="loader">Generating images...</div>

</div>

<div class="gallery" id="gallery"></div>

</div>

<script>

let generatedImages=[]

const dropZone=document.getElementById("dropZone")

dropZone.addEventListener("dragover",e=>{
e.preventDefault()
dropZone.classList.add("drag")
})

dropZone.addEventListener("dragleave",()=>{
dropZone.classList.remove("drag")
})

dropZone.addEventListener("drop",e=>{
e.preventDefault()
dropZone.classList.remove("drag")
document.getElementById("file").files=e.dataTransfer.files
})

function generate(){

generatedImages=[]

const file=document.getElementById("file").files[0]

if(!file){
alert("Upload image first")
return
}

document.getElementById("loader").style.display="block"

const data=new FormData()

data.append("file",file)
data.append("upload_preset","y10zgm3v")

fetch("https://api.cloudinary.com/v1_1/dziivw8db/image/upload",{
method:"POST",
body:data
})

.then(res=>res.json())
.then(result=>{

document.getElementById("loader").style.display="none"

const id=result.public_id

const variations=[

"e_background_removal,c_pad,b_white,w_2000,h_2000,q_auto,f_auto,e_shadow",
"e_background_removal,c_fill,g_auto,w_2000,h_2000,q_auto,f_auto,e_shadow",
"e_background_removal,c_fit,g_auto,w_2000,h_2000,q_auto,f_auto,e_shadow",

"e_background_removal,c_pad,b_white,w_1800,h_1800,q_auto,f_auto,e_shadow",
"e_background_removal,c_fill,g_auto,w_1800,h_1800,q_auto,f_auto,e_shadow",
"e_background_removal,c_fit,g_auto,w_1800,h_1800,q_auto,f_auto,e_shadow",

"e_background_removal,c_pad,b_white,w_1500,h_1500,q_auto,f_auto,e_shadow",
"e_background_removal,c_fill,g_auto,w_1500,h_1500,q_auto,f_auto,e_shadow"

]

const gallery=document.getElementById("gallery")

gallery.innerHTML=""

variations.forEach((v,i)=>{

const card=document.createElement("div")
card.className="card"

const img=document.createElement("img")

const url=`https://res.cloudinary.com/dziivw8db/image/upload/${v}/${id}`

img.src=url

generatedImages.push(url)

const link=document.createElement("a")
link.href=url
link.download="catalog_"+i+".jpg"
link.className="download"
link.innerText="Download"

card.appendChild(img)
card.appendChild(link)

gallery.appendChild(card)

})

})

.catch(()=>{
document.getElementById("loader").style.display="none"
alert("Image processing failed")
})

}

function downloadAll(){

generatedImages.forEach((url,i)=>{

const link=document.createElement("a")
link.href=url
link.download="catalog_"+i+".jpg"
link.click()

})

}

</script>

</body>

</html>
