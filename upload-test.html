<!DOCTYPE html>
<html>

<head>

<title>Meesho Image Generator</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#ff3f8e;
padding:40px;
color:white;
}

h1{
font-size:40px;
}

button{
background:white;
color:#ff3f8e;
padding:15px 30px;
border:none;
font-size:18px;
cursor:pointer;
margin-top:20px;
border-radius:8px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:30px;
margin-top:40px;
}

.card{
text-align:center;
}

img{
width:200px;
background:white;
padding:20px;
border-radius:10px;
}

a{
display:block;
margin-top:10px;
color:white;
font-weight:bold;
text-decoration:none;
}

</style>

</head>

<body>

<h1>Meesho Image Generator</h1>

<p>Upload your product image and generate optimized catalog images.</p>

<input type="file" id="file">

<br>

<button onclick="generate()">Generate Images</button>

<div class="grid" id="gallery"></div>

<script>

function generate(){

const file=document.getElementById("file").files[0]

if(!file){
alert("Upload image first")
return
}

const data=new FormData()

data.append("file",file)
data.append("upload_preset","unsigned_upload")

fetch("https://api.cloudinary.com/v1_1/dziivw8db/image/upload",{
method:"POST",
body:data
})

.then(res=>res.json())

.then(result=>{

const base=result.secure_url

const gallery=document.getElementById("gallery")

gallery.innerHTML=""

for(let i=0;i<10;i++){

const card=document.createElement("div")
card.className="card"

const img=document.createElement("img")

img.src=base

const link=document.createElement("a")

link.href=base
link.download="catalog-image"
link.innerText="Download"

card.appendChild(img)
card.appendChild(link)

gallery.appendChild(card)

}

})

}

</script>

</body>

</html>
